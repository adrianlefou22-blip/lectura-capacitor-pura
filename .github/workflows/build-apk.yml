name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install TTS plugin
        run: npm install @capacitor-community/text-to-speech@6.0.0 --legacy-peer-deps

      - name: Remove android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore custom files
        run: |
          cp android_custom/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android_custom/MainActivity.java "android/app/src/main/java/com/lecturapura/app/MainActivity.java"
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            if [ -f android_custom/icons/mipmap-$density/ic_launcher.png ]; then
              cp android_custom/icons/mipmap-$density/ic_launcher.png android/app/src/main/res/mipmap-$density/ic_launcher.png
              cp android_custom/icons/mipmap-$density/ic_launcher_round.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
              cp android_custom/icons/mipmap-$density/ic_launcher_foreground.png android/app/src/main/res/mipmap-$density/ic_launcher_foreground.png
            fi
          done
          if [ -f android_custom/icons/mipmap-anydpi-v26/ic_launcher.xml ]; then
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            cp android_custom/icons/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/
            cp android_custom/icons/mipmap-anydpi-v26/ic_launcher_round.xml android/app/src/main/res/mipmap-anydpi-v26/
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: cd android && gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: lectura-pura-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
