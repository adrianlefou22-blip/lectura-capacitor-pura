name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Copy icons to Android
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android/app/src/main/res/mipmap-$density/ic_launcher.png /tmp/ic_$density.png
          done
          npx cap sync android
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp /tmp/ic_$density.png android/app/src/main/res/mipmap-$density/ic_launcher.png
            cp /tmp/ic_$density.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
          done

      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lectura-pura-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
